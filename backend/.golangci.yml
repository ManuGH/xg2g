version: "2"

# golangci-lint configuration file
# see https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: false # Skip tests to reduce noise on legacy test files

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - errcheck # Enabled for strict quality gates
  # v2 schema: linter settings nest under linters.settings (the old top-level
  # `linters-settings` is a v1 key — silently ignored here and rejected by
  # `golangci-lint config verify`).
  settings:
    staticcheck:
      checks: ["all"]

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
