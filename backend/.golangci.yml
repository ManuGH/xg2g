version: 2

# golangci-lint configuration file
# see https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: false # Skip tests to reduce noise on legacy test files

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - errcheck # Enabled for strict quality gates
  exclusions:
    rules:
      # Generated OpenAPI server stubs contain constant names (BearerAuthScopes,
      # ProblemCodeTOKEN*) that trigger G101 false positives.
      - path: server_gen\.go$
        linters:
          - gosec

linters-settings:
  staticcheck:
    checks: ["all"]

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
