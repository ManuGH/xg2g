version: "2"

# golangci-lint configuration file
# see https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: false # Skip tests to reduce noise on legacy test files

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - errcheck # Enabled for strict quality gates
  exclusions:
    rules:
      # Generated OpenAPI server stubs contain constant names (BearerAuthScopes,
      # ProblemCodeTOKEN*) that trigger G101 false positives.
      - path: server_gen\.go$
        linters:
          - gosec
          - gofmt
      # ST1000, ST1003, ST1020, ST1021, ST1023 are style-only staticcheck
      # rules (naming conventions, comment formats). These are pre-existing
      # across the codebase — excluded here to keep this PR focused on its
      # audit scope rather than a broad formatting cleanup.
      - linters:
          - staticcheck
        text: "ST1000:"
      - linters:
          - staticcheck
        text: "ST1003:"
      - linters:
          - staticcheck
        text: "ST1020:"
      - linters:
          - staticcheck
        text: "ST1021:"
      - linters:
          - staticcheck
        text: "ST1023:"
  # v2 schema: linter settings nest under linters.settings (the old top-level
  # `linters-settings` is a v1 key — silently ignored here and rejected by
  # `golangci-lint config verify`).
  settings:
    staticcheck:
      checks: ["all"]

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
