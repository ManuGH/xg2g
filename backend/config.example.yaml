# yaml-language-server: $schema=./docs/guides/config.schema.json
# xg2g Configuration File (v3.0+)
#
# This file is generated by cmd/configgen from internal/config/registry.go.
# xg2g is 12-Factor App compliant and can be fully configured via environment variables (ENV).
#
# ENV precedence: ENV > config.yaml > Defaults
#
# To validate your config:
#   xg2g config validate --config /path/to/config.yaml

logLevel: "info" # ENV: XG2G_LOG_LEVEL
dataDir: "/tmp" # ENV: XG2G_DATA

enigma2:
  baseUrl: "http://127.0.0.1" # ENV: XG2G_E2_HOST
  timeout: "10s" # ENV: XG2G_E2_TIMEOUT
  retries: 2 # ENV: XG2G_E2_RETRIES

epg:
  enabled: true # ENV: XG2G_EPG_ENABLED
  days: 14 # ENV: XG2G_EPG_DAYS
  xmltvPath: "xmltv.xml" # ENV: XG2G_XMLTV
  fuzzyMax: 2 # ENV: XG2G_FUZZY_MAX
  source: "per-service" # ENV: XG2G_EPG_SOURCE

api:
  listenAddr: "127.0.0.1:8088" # ENV: XG2G_LISTEN
  token: "" # ENV: XG2G_API_TOKEN
