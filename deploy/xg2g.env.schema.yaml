schemaVersion: 1
targetPath: /etc/xg2g/xg2g.env
migrationPhase: step1_parallel_bundle
unknownKeys: warn

sources:
  deployBundle:
    - deploy/xg2g.service
    - deploy/docker-compose.yml
    - deploy/docker-compose.gpu.yml
  legacyCompatibilityMirrors:
    - docs/ops/xg2g.service
    - docker-compose.yml
    - docker-compose.gpu.yml
  appConfigRegistry:
    - backend/internal/config/registry.go
    - backend/internal/config/runtime_env.go

notes:
  - This schema defines the host env contract, not the full application config surface.
  - Step 1 keeps common host-side app overrides intentionally narrow.
  - Future slices should derive the app override section from the config registry instead of maintaining it manually.

sections:
  deployContract:
    description: Keys consumed directly by systemd preflight, compose file resolution, or mandatory startup gates.
    keys:
      COMPOSE_FILE:
        type: compose_file_list
        required: false
        default: ""
        sensitive: false
        description: Optional explicit compose file selection consumed by compose-xg2g.sh.
      XG2G_E2_HOST:
        type: url
        required: false
        sensitive: false
        anyOfGroup: receiver_base_url
        description: Canonical Enigma2 receiver base URL.
      XG2G_OWI_BASE:
        type: url
        required: false
        status: legacy_fallback
        sensitive: false
        anyOfGroup: receiver_base_url
        description: Legacy receiver base URL. If set together with XG2G_E2_HOST, trimmed values must match.
      XG2G_API_TOKEN:
        type: string
        required: true
        sensitive: true
        minLength: 1
        description: Control-plane bearer token required by systemd preflight and operator tooling.
      XG2G_DECISION_SECRET:
        type: string
        required: true
        sensitive: true
        minLength: 32
        description: Live playback signing key required before any container is started.

  commonAppOverrides:
    description: Common app-level env overrides frequently stored in xg2g.env on real hosts during the migration period.
    keys:
      XG2G_API_TOKEN_SCOPES:
        type: csv
        required: false
        default: ""
        sensitive: false
        description: Scopes for the primary API token.
      XG2G_API_TOKENS:
        type: json_or_legacy_token_map
        required: false
        default: ""
        sensitive: true
        description: Additional scoped API tokens.
      XG2G_BOUQUET:
        type: string
        required: false
        default: ""
        sensitive: false
        description: Bouquet selection override.
      XG2G_CONFIG_STRICT:
        type: bool
        required: false
        default: "true"
        sensitive: false
        description: Fail startup on unknown YAML config keys.
      XG2G_FFMPEG_BIN:
        type: path
        required: false
        default: /usr/local/bin/ffmpeg
        sensitive: false
        description: FFmpeg binary override.
      XG2G_FFPROBE_BIN:
        type: path
        required: false
        default: /usr/local/bin/ffprobe
        sensitive: false
        description: FFprobe binary override.
      XG2G_HLS_ROOT:
        type: path
        required: false
        default: ""
        sensitive: false
        description: Optional HLS root override. Defaults to $XG2G_DATA/hls when unset.
      XG2G_LISTEN:
        type: listen_addr
        required: false
        default: :8088
        sensitive: false
        description: API listen address override.
      XG2G_LOG_LEVEL:
        type: string
        required: false
        default: info
        sensitive: false
        description: Runtime log level override.
      XG2G_METRICS_LISTEN:
        type: listen_addr
        required: false
        default: ""
        sensitive: false
        description: Metrics listen address. Empty disables metrics.
      XG2G_STORE_PATH:
        type: path
        required: false
        default: /var/lib/xg2g/store
        sensitive: false
        description: Persistent store path override.
      XG2G_STREAMING_POLICY:
        type: string
        required: false
        default: universal
        sensitive: false
        description: Streaming policy override.
      XG2G_VAAPI_DEVICE:
        type: path
        required: false
        default: ""
        sensitive: false
        description: Optional VAAPI device override for GPU hosts.

validation:
  - id: receiver_base_url_present
    kind: at_least_one_present
    keys:
      - XG2G_E2_HOST
      - XG2G_OWI_BASE
  - id: receiver_aliases_match_when_both_present
    kind: equal_trimmed_when_present
    keys:
      - XG2G_E2_HOST
      - XG2G_OWI_BASE
  - id: api_token_non_empty
    kind: non_empty
    key: XG2G_API_TOKEN
  - id: decision_secret_min_length
    kind: min_length
    key: XG2G_DECISION_SECRET
    min: 32
