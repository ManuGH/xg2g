# xg2g behind nginx (TLS termination + HTTP→HTTPS redirect at the edge).
#
# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED on the xg2g side — or HSTS, Secure cookies, real client-IP,
# rate-limiting and the LAN guard SILENTLY break (xg2g ignores X-Forwarded-*
# from untrusted sources by design):
#
#   XG2G_TRUSTED_PROXIES=<ip-or-cidr-nginx-connects-from>     # e.g. 127.0.0.1/32
#   XG2G_ALLOWED_ORIGINS=https://tv.example.com               # for CORS/CSRF
#   XG2G_CONNECTIVITY_PROFILE=reverse_proxy                   # enforces TrustedProxies (fatal if unset)
#
# In Docker, nginx's source IP as seen by xg2g is the Docker network address —
# set the network CIDR (e.g. 172.18.0.0/16), not 127.0.0.1.
# ─────────────────────────────────────────────────────────────────────────────

upstream xg2g_backend {
    # 8088 = production default; 8089 = staging.
    # Use "xg2g:8088" if nginx and xg2g are in the same Docker network.
    server 127.0.0.1:8088;
    keepalive 16;
}

# Redirect plain HTTP to HTTPS. The redirect belongs here at the edge — xg2g
# itself listens on a single scheme (TLS *or* plain), so it cannot redirect.
server {
    listen 80;
    listen [::]:80;
    server_name tv.example.com;
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # Note: "http2 on;" requires nginx 1.25.1+. For older versions, use "listen 443 ssl http2;" instead.
    http2 on;
    server_name tv.example.com;

    # Your certificate (certbot, your CA, or a self-signed pair).
    ssl_certificate     /etc/nginx/tls/tv.example.com.crt;
    ssl_certificate_key /etc/nginx/tls/tv.example.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Match xg2g's 4 MiB body ceiling with headroom (clean 413 from the app).
    client_max_body_size 8m;

    location / {
        proxy_pass http://xg2g_backend;
        proxy_http_version 1.1;

        # The forwarded headers xg2g trusts (only from XG2G_TRUSTED_PROXIES).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Live HLS: stream bytes straight through (lower latency, no buffering
        # of segments to disk) and allow long-lived requests.
        proxy_buffering    off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;

        # xg2g compresses its own responses (#548) — do NOT enable `gzip on`
        # here, it would double-compress. nginx passes Content-Encoding through.
    }
}
