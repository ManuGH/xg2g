name: Container Security Scanning

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read # Global read-only, write per job

concurrency:
  group: repo-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Scan for Secrets (Gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Latest stable
        with:
          fetch-depth: 0 # Full history for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scan-production-image:
    name: Scan Production Container (Pure Go)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Latest stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: "Build production image (Pure Go)"
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: "0"
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: xg2g:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: xg2g:${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          vuln-type: "os,library"
          ignore-unfixed: false

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "container-production"

      - name: Fail on critical/high vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: xg2g:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  scan-image-configuration:
    name: Scan Image Configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Latest stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build production image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: "0"
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: xg2g:${{ github.sha }}
          provenance: false

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: xg2g:${{ github.sha }}
          scan-type: "config"
          format: "table"
          output: "trivy-config.txt"
          exit-code: "0"

      - name: Upload configuration scan results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        if: always()
        with:
          name: trivy-config-report
          path: trivy-config.txt
          retention-days: 30

  scan-filesystem:
    name: Scan Filesystem for Secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Latest stable

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH"
          scanners: "secret,misconfig"

      - name: Upload filesystem scan to GitHub Security
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v3.27.9
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "filesystem-secrets"

  generate-sbom:
    name: Generate and Scan SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # Latest stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build production image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          SOURCE_DATE_EPOCH: "0"
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: xg2g:${{ github.sha }}
          provenance: false

      - name: Generate SBOM for production image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: xg2g:${{ github.sha }}
          format: "cyclonedx"
          output: "sbom-production.json"
          scan-type: "image"

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.3
        with:
          name: container-sbom
          path: sbom-production.json
          retention-days: 90

      - name: Scan SBOM for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: "sbom"
          scan-ref: "sbom-production.json"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
