name: CI Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-nightly:
    name: Nightly Gates (Deep & Expensive)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOTOOLCHAIN: auto
      TZ: UTC

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1


      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Verify Go toolchain policy
        run: ./backend/scripts/check-go-toolchain.sh

      - name: Install golangci-lint (built with runner Go)
        run: |
          set -euo pipefail
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
          golangci-lint --version

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Build WebUI assets (required for embed contract)
        run: make ui-build

      - name: Install ffmpeg
        run: |
          set -euo pipefail
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg already installed on runner"
          else
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Install ripgrep
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            echo "rg already installed on runner"
          else
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
          rg --version

      - name: Run nightly gates
        run: make ci-nightly

  nightly-doc-lint:
    name: Nightly Spec/Docs Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: UTC

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup Node for OpenAPI + Markdown lint
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Lint OpenAPI (nightly)
        run: |
          set -euo pipefail
          npx --yes @redocly/cli@1.31.0 lint backend/api/openapi.yaml --format=stylish | tee /tmp/openapi-lint.txt

      - name: Lint Markdown (nightly)
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.14.0 "docs/**/*.md" ".github/**/*.md" "*.md" "!CHANGELOG.md"

  nightly-failure-alert:
    name: Nightly Failure Alert
    needs: [ci-nightly, nightly-doc-lint]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      (
        needs.ci-nightly.result == 'failure' || needs.ci-nightly.result == 'cancelled' ||
        needs.nightly-doc-lint.result == 'failure' || needs.nightly-doc-lint.result == 'cancelled'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create fail alert issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NIGHTLY_GATES_RESULT: ${{ needs.ci-nightly.result }}
          NIGHTLY_DOC_LINT_RESULT: ${{ needs.nightly-doc-lint.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const title = `[CI Nightly] Scheduled run failed: ${process.env.GITHUB_RUN_ID}`;

            const body = [
              "Scheduled CI Nightly run failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "| Job | Result |",
              "|---|---:|",
              `| Nightly Gates (Deep & Expensive) | ${process.env.NIGHTLY_GATES_RESULT} |`,
              `| Nightly Spec/Docs Lint | ${process.env.NIGHTLY_DOC_LINT_RESULT} |`,
              "",
              `Commit: \`${process.env.GITHUB_SHA}\``,
              `Workflow: \`${process.env.GITHUB_WORKFLOW}\``,
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

  nightly-close-stale-alerts:
    name: Nightly Close Stale Alerts
    needs: [ci-nightly, nightly-doc-lint]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      needs.ci-nightly.result != 'failure' &&
      needs.ci-nightly.result != 'cancelled' &&
      needs.nightly-doc-lint.result != 'failure' &&
      needs.nightly-doc-lint.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close stale nightly alert issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const prefix = "[CI Nightly] Scheduled run failed:";
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${prefix}"`,
              per_page: 100,
            });

            for (const issue of data.items) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Closing after a successful scheduled CI Nightly run: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "completed",
              });
            }
