name: CI Deep Scheduled
run-name: >-
  CI Deep Scheduled /
  ${{ github.event_name == 'workflow_dispatch' && 'manual' || github.event.schedule == '0 3 * * 0' && 'weekly' || 'nightly' }}

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # nightly (UTC)
    - cron: "0 3 * * 0" # weekly (UTC, Sunday)

permissions:
  contents: read
  issues: write

concurrency:
  group: repo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GOTOOLCHAIN: auto
  TZ: UTC
  NIGHTLY_CRON: "0 2 * * *"
  WEEKLY_CRON: "0 3 * * 0"

jobs:
  nightly-race:
    name: nightly-race
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Build WebUI assets (embed prereq)
        run: |
          set -euo pipefail
          make ui-build

      - name: Install ffmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Run race suite
        run: |
          set -euo pipefail
          cd backend
          go test -race -count=1 -timeout=20m ./... 2>&1 | tee nightly-race.log

      - name: Upload race logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: nightly-race-logs
          path: backend/nightly-race.log
          if-no-files-found: ignore
          retention-days: 14

  nightly-integration:
    name: nightly-integration
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Run integration and invariants (fail-fast)
        run: |
          set -euo pipefail
          cd backend
          go test -count=1 -failfast -timeout=20m ./test/integration/... ./test/invariants/... 2>&1 | tee nightly-integration.log

      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: nightly-integration-logs
          path: backend/nightly-integration.log
          if-no-files-found: ignore
          retention-days: 14

  nightly-spec-doc-lint:
    name: nightly-spec-doc-lint
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node for OpenAPI + Markdown lint
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Lint OpenAPI (nightly)
        run: |
          set -euo pipefail
          npx --yes @redocly/cli@1.31.0 lint backend/api/openapi.yaml --format=stylish | tee /tmp/openapi-lint.txt

      - name: Lint Markdown (nightly)
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli2@0.14.0 "docs/**/*.md" ".github/**/*.md" "*.md" "!CHANGELOG.md"

  weekly-security-deep:
    name: weekly-security-deep
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Install security tools
        run: |
          set -euo pipefail
          cd backend
          toolchain="$(go env GOVERSION)"
          GOTOOLCHAIN="${toolchain}" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          GOTOOLCHAIN="${toolchain}" go install github.com/securego/gosec/v2/cmd/gosec@v2.22.11
          go version -m "$(go env GOPATH)/bin/govulncheck" | sed -n '1,2p'
          go version -m "$(go env GOPATH)/bin/gosec" | sed -n '1,2p'

      - name: Run security scanners
        run: |
          set +e
          set -u -o pipefail
          cd backend
          bash ./scripts/ci/run-govulncheck.sh json govulncheck.json 2> govulncheck.stderr
          GOVULN_EXIT=$?
          bash ./scripts/ci/run-gosec.sh gosec.sarif 2> gosec.stderr
          GOSEC_EXIT=$?

          if [ "$GOVULN_EXIT" -ne 0 ] || [ "$GOSEC_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Upload security reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: weekly-security-reports
          path: |
            backend/govulncheck.json
            backend/govulncheck.stderr
            backend/gosec.sarif
            backend/gosec.stderr
          if-no-files-found: ignore
          retention-days: 14

  weekly-governance-deep:
    name: weekly-governance-deep
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Run governance deep checks
        run: |
          set -euo pipefail

          NEW_JSX=$(find frontend/webui/src -type f -name '*.jsx' || true)
          if [ -n "$NEW_JSX" ]; then
            echo "❌ New .jsx files detected:"
            echo "$NEW_JSX"
            exit 1
          fi

          bash frontend/webui/scripts/verify-client-wrapper-boundary.sh

          cd frontend/webui
          npm ci
          npm run build

  deep-summary:
    name: deep-summary
    needs: [nightly-race, nightly-integration, nightly-spec-doc-lint, weekly-security-deep, weekly-governance-deep]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Summary (Job / Command / Exit)
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          RACE_RESULT: ${{ needs.nightly-race.result }}
          INTEGRATION_RESULT: ${{ needs.nightly-integration.result }}
          DOC_LINT_RESULT: ${{ needs.nightly-spec-doc-lint.result }}
          SECURITY_RESULT: ${{ needs.weekly-security-deep.result }}
          GOVERNANCE_RESULT: ${{ needs.weekly-governance-deep.result }}
        run: |
          set -euo pipefail

          map_exit() {
            case "$1" in
              success) echo "0" ;;
              skipped) echo "SKIP" ;;
              *) echo "1" ;;
            esac
          }

          RACE_EXIT="$(map_exit "$RACE_RESULT")"
          INTEGRATION_EXIT="$(map_exit "$INTEGRATION_RESULT")"
          DOC_LINT_EXIT="$(map_exit "$DOC_LINT_RESULT")"
          SECURITY_EXIT="$(map_exit "$SECURITY_RESULT")"
          GOVERNANCE_EXIT="$(map_exit "$GOVERNANCE_RESULT")"

          case "${EVENT_NAME}:${EVENT_SCHEDULE}" in
            workflow_dispatch:*) SUITE_LABEL="manual (nightly + weekly)" ;;
            *:"$NIGHTLY_CRON") SUITE_LABEL="nightly" ;;
            *:"$WEEKLY_CRON") SUITE_LABEL="weekly" ;;
            *) SUITE_LABEL="$EVENT_NAME" ;;
          esac

          {
            echo "## Deep Suite Summary"
            echo ""
            echo "Trigger: \`$SUITE_LABEL\`"
            echo ""
            echo "| Job | Command | Result | Exit |"
            echo "|---|---|---:|---:|"
            echo "| nightly-race | \`cd backend && go test -race -count=1 ./...\` | $RACE_RESULT | $RACE_EXIT |"
            echo "| nightly-integration | \`cd backend && go test -count=1 -failfast ./test/integration/... ./test/invariants/...\` | $INTEGRATION_RESULT | $INTEGRATION_EXIT |"
            echo "| nightly-spec-doc-lint | \`redocly lint + markdownlint-cli2\` | $DOC_LINT_RESULT | $DOC_LINT_EXIT |"
            echo "| weekly-security-deep | \`cd backend && govulncheck -tags=nogpu ./... && gosec -severity=high ... ./...\` | $SECURITY_RESULT | $SECURITY_EXIT |"
            echo "| weekly-governance-deep | \`jsx + wrapper-boundary guards + (cd frontend/webui && npm ci && npm run build)\` | $GOVERNANCE_RESULT | $GOVERNANCE_EXIT |"
          } >> "$GITHUB_STEP_SUMMARY"

  deep-alert-on-failure:
    name: deep-alert-on-failure
    needs: [nightly-race, nightly-integration, nightly-spec-doc-lint, weekly-security-deep, weekly-governance-deep, deep-summary]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      (
        needs.nightly-race.result == 'failure' || needs.nightly-race.result == 'cancelled' ||
        needs.nightly-integration.result == 'failure' || needs.nightly-integration.result == 'cancelled' ||
        needs.nightly-spec-doc-lint.result == 'failure' || needs.nightly-spec-doc-lint.result == 'cancelled' ||
        needs.weekly-security-deep.result == 'failure' || needs.weekly-security-deep.result == 'cancelled' ||
        needs.weekly-governance-deep.result == 'failure' || needs.weekly-governance-deep.result == 'cancelled'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create fail alert issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RACE_RESULT: ${{ needs.nightly-race.result }}
          INTEGRATION_RESULT: ${{ needs.nightly-integration.result }}
          DOC_LINT_RESULT: ${{ needs.nightly-spec-doc-lint.result }}
          SECURITY_RESULT: ${{ needs.weekly-security-deep.result }}
          GOVERNANCE_RESULT: ${{ needs.weekly-governance-deep.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const schedule = context.payload.schedule || "";
            const suite =
              schedule === process.env.NIGHTLY_CRON ? "nightly" :
              schedule === process.env.WEEKLY_CRON ? "weekly" :
              "scheduled";
            const title = `[CI Deep][${suite}] Scheduled run failed: ${process.env.GITHUB_RUN_ID}`;

            const body = [
              `Scheduled deep-suite run failed for \`${suite}\`.`,
              "",
              `Run: ${runUrl}`,
              `Suite: \`${suite}\``,
              `Schedule: \`${schedule || "unknown"}\``,
              "",
              "| Job | Result |",
              "|---|---:|",
              `| nightly-race | ${process.env.RACE_RESULT} |`,
              `| nightly-integration | ${process.env.INTEGRATION_RESULT} |`,
              `| nightly-spec-doc-lint | ${process.env.DOC_LINT_RESULT} |`,
              `| weekly-security-deep | ${process.env.SECURITY_RESULT} |`,
              `| weekly-governance-deep | ${process.env.GOVERNANCE_RESULT} |`,
              "",
              `Commit: \`${process.env.GITHUB_SHA}\``,
              `Workflow: \`${process.env.GITHUB_WORKFLOW}\``,
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

  deep-close-stale-alerts:
    name: deep-close-stale-alerts
    needs: [nightly-race, nightly-integration, nightly-spec-doc-lint, weekly-security-deep, weekly-governance-deep, deep-summary]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      needs.nightly-race.result != 'failure' &&
      needs.nightly-race.result != 'cancelled' &&
      needs.nightly-integration.result != 'failure' &&
      needs.nightly-integration.result != 'cancelled' &&
      needs.nightly-spec-doc-lint.result != 'failure' &&
      needs.nightly-spec-doc-lint.result != 'cancelled' &&
      needs.weekly-security-deep.result != 'failure' &&
      needs.weekly-security-deep.result != 'cancelled' &&
      needs.weekly-governance-deep.result != 'failure' &&
      needs.weekly-governance-deep.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Close stale deep-suite alert issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const titlePrefixes = [
              "[CI Deep] Scheduled run failed:",
              "[CI Deep][nightly] Scheduled run failed:",
              "[CI Deep][weekly] Scheduled run failed:",
              "[CI Deep][scheduled] Scheduled run failed:",
            ];
            const schedule = context.payload.schedule || "";
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open "[CI Deep]" "Scheduled run failed"`,
              per_page: 100,
            });

            for (const issue of data.items) {
              if (!titlePrefixes.some((prefix) => issue.title.startsWith(prefix))) {
                continue;
              }

              const body = issue.body || "";
              const suite = (body.match(/^Suite: `([^`]+)`/m) || [])[1] || "";
              const matchesNightly =
                suite === "nightly" ||
                body.includes("| weekly-security-deep | skipped |") &&
                body.includes("| weekly-governance-deep | skipped |");
              const matchesWeekly =
                suite === "weekly" ||
                body.includes("| nightly-race | skipped |") &&
                body.includes("| nightly-integration | skipped |");

              if (schedule === "0 2 * * *" && !matchesNightly) {
                continue;
              }
              if (schedule === "0 3 * * 0" && !matchesWeekly) {
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Closing after a successful scheduled deep-suite run: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "completed",
              });
            }
