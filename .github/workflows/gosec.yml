name: Security - Gosec

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 0" # weekly

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # Latest stable

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # Latest stable
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install gosec (pinned)
        run: |
          set -euo pipefail
          toolchain="$(go env GOVERSION)"
          GOTOOLCHAIN="${toolchain}" go install github.com/securego/gosec/v2/cmd/gosec@v2.22.11
          go version -m "$(go env GOPATH)/bin/gosec" | sed -n '1,2p'

      - name: Run gosec security scan
        run: |
          cd backend
          bash ./scripts/ci/run-gosec.sh ../gosec.sarif

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: gosec.sarif
