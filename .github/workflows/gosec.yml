name: Security - Gosec

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 0" # weekly

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Latest stable

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # Latest stable
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install gosec (pinned)
        run: |
          set -euo pipefail
          toolchain="$(go env GOVERSION)"
          GOTOOLCHAIN="${toolchain}" go install github.com/securego/gosec/v2/cmd/gosec@v2.22.11
          go version -m "$(go env GOPATH)/bin/gosec" | sed -n '1,2p'

      - name: Run gosec security scan
        run: |
          cd backend
          bash ./scripts/ci/run-gosec.sh ../gosec.sarif

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: gosec.sarif
