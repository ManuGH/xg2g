name: Security - Gosec

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 0" # weekly

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GO111MODULE: on

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # Latest stable

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # Latest stable
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install gosec (pinned)
        run: |
          set -euo pipefail
          toolchain="$(go env GOVERSION)"
          GOTOOLCHAIN="${toolchain}" go install github.com/securego/gosec/v2/cmd/gosec@v2.22.11
          go version -m "$(go env GOPATH)/bin/gosec" | sed -n '1,2p'

      - name: Run gosec security scan
        run: |
          cd backend
          bash ./scripts/ci/run-gosec.sh ../gosec.sarif

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: gosec.sarif
