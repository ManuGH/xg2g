name: API Docs (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/api/openapi.yaml"
      - "docs/api/**"
      - ".github/workflows/api-docs-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: repo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build API Docs Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Latest stable

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static API docs site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R docs/api/. _site/
          cp backend/api/openapi.yaml _site/openapi.yaml
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy API Docs
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
