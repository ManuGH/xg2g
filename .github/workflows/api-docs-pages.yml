name: API Docs (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/api/openapi.yaml"
      - "docs/api/**"
      - ".github/workflows/api-docs-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: repo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build API Docs Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # Latest stable

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build static API docs site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R docs/api/. _site/
          cp backend/api/openapi.yaml _site/openapi.yaml
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    name: Deploy API Docs
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
