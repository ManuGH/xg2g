name: PR Required Gates
# Canonical PR-time WebUI integration gate.
# Scope is intentionally narrow: build + browser-backed smoke for WebUI-relevant changes.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required-gates:
    name: Required Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Check non-empty diff
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          ./backend/scripts/ci/check-empty-delta.sh "origin/${{ github.base_ref }}"

      - name: Resolve PR scopes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "range=manual"
              echo "webui_gate_needed=true"
              echo "changed_count=manual"
              echo "skip_reason="
            } >> "$GITHUB_OUTPUT"
            echo "Manual run: forcing canonical WebUI gate."
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          if [ -z "${BASE_SHA}" ] || [ -z "${HEAD_SHA}" ]; then
            echo "ERROR: cannot determine diff range (missing base/head sha): base='${BASE_SHA}' head='${HEAD_SHA}'"
            exit 1
          fi

          if ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            echo "ERROR: cannot determine diff range (head sha not found locally): ${HEAD_SHA}"
            exit 1
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "ERROR: cannot determine diff range (base sha not found after fetch): ${BASE_SHA}"
            exit 1
          fi

          if ! git merge-base "${BASE_SHA}" "${HEAD_SHA}" >/dev/null 2>&1; then
            echo "ERROR: cannot determine diff range (no merge-base): base=${BASE_SHA} head=${HEAD_SHA}"
            exit 1
          fi

          RANGE="${BASE_SHA}...${HEAD_SHA}"
          changed_files="$(git diff --name-only "$RANGE" || true)"
          changed_count="${{ github.event.pull_request.changed_files }}"

          skip_reason=""
          webui_gate_needed=false
          # The browser smoke includes the real-hls.js playback spec, so it must
          # also run when the live playback path changes on the backend: the
          # transcode pipeline (infra/media/ffmpeg), the session lifecycle
          # (domain/session) and the HTTP layer that serves HLS + sessions
          # (control/http/v3). Previously a pure transcode/session PR skipped it.
          if printf '%s\n' "$changed_files" | grep -Eq '^(frontend/webui/|backend/e2e/|backend/internal/infra/media/ffmpeg/|backend/internal/domain/session/|backend/internal/control/http/v3/|\.github/workflows/pr-required-gates\.yml$)'; then
            webui_gate_needed=true
          fi

          if [ "$webui_gate_needed" = "false" ]; then
            if [ -z "$skip_reason" ]; then
              skip_reason="no_relevant_changes"
            fi
          fi

          {
            echo "range=$RANGE"
            echo "webui_gate_needed=$webui_gate_needed"
            echo "changed_count=${changed_count:-0}"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          echo "Diff range: $RANGE"
          echo "PR changed files (GitHub): ${changed_count:-0}"
          echo "WebUI gate needed: $webui_gate_needed"
          if [ -n "$skip_reason" ]; then
            echo "skip_reason=$skip_reason"
          fi

      - name: Scope skip reason
        if: steps.scope.outputs.skip_reason != ''
        run: echo "skip_reason=${{ steps.scope.outputs.skip_reason }}"

      - name: Setup Node for WebUI gate
        if: steps.scope.outputs.webui_gate_needed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/webui/package-lock.json
            backend/e2e/fixture-server/package-lock.json

      - name: Install WebUI gate dependencies
        if: steps.scope.outputs.webui_gate_needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          cd frontend/webui
          npm ci
          cd ../../backend/e2e/fixture-server
          npm ci

      - name: WebUI build
        if: steps.scope.outputs.webui_gate_needed == 'true'
        run: |
          set -euo pipefail
          cd frontend/webui
          npm run build

      - name: WebUI browser smoke
        if: steps.scope.outputs.webui_gate_needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # ffmpeg generates the HLS fixture for the real-hls.js playback spec;
          # without it that spec skips itself (see scripts/gen-hls-fixture.sh).
          sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
          npx playwright install --with-deps chromium
          make webui-browser-smoke

      - name: WebUI gate skipped by scope
        if: steps.scope.outputs.webui_gate_needed != 'true'
        run: echo "No WebUI/browser-gate-relevant changes; canonical WebUI PR gate skipped by scope."
