name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "backend/**/*.go"
      - ".github/**"
      - backend/go.mod
      - backend/go.sum
      - "backend/api/openapi.yaml"
      - "backend/config.example.yaml"
      - "backend/config.generated.example.yaml"
      - "docs/**"
      - "backend/e2e/**"
      - "backend/internal/**"
      - "Dockerfile"
      - "Dockerfile.*"
      - "docker-compose*.yml"
      - "README.md"
      - "backend/scripts/**"
      - "Makefile"
      - "backend/templates/**"
      - "frontend/webui/**"
      - "VERSION"
      - "WORKFLOW.md"

permissions:
  contents: read

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-pr:
    name: CI / PR Gate (Fast & Deterministic)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: auto
      TZ: UTC

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Token URL gate
        run: |
          set -euo pipefail
          if git grep -n -i -E '(\?|&)(token|access_token|auth|jwt|bearer)=' -- . ':!backend/vendor'; then
            echo "❌ denylisted auth-like query key found in URL parameters"
            exit 1
          fi
          echo "✅ token URL gate passed"


      - name: Set Reproducible Build Headers
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache-dependency-path: backend/go.sum
          # Cache restore has been flaky (tar exit code 2). Disable to keep CI deterministic.
          cache: false
        env:
          GOTOOLCHAIN: auto

      - name: Verify Go toolchain policy
        run: ./backend/scripts/check-go-toolchain.sh

      - name: Verify modules
        run: |
          set -euo pipefail
          cd backend
          go mod verify
          git diff --exit-code -- go.mod go.sum

      - name: Install golangci-lint (built with runner Go)
        run: |
          set -euo pipefail
          cd backend
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
          golangci-lint --version

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: frontend/webui/package-lock.json

      - name: Install check-jsonschema
        run: |
          set -euo pipefail
          python3 -m pip install --user check-jsonschema==0.34.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          check-jsonschema --version

      - name: Run PR gate bundle
        # The default PR gate is intentionally deterministic and must not
        # depend on optional ffmpeg/system-package availability.
        run: make ci-pr

  race-pr:
    name: CI / Race Detector (live concurrency packages)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOTOOLCHAIN: auto
      TZ: UTC

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache-dependency-path: backend/go.sum
          cache: false
        env:
          GOTOOLCHAIN: auto

      - name: Run scoped race detector
        # Packages where the live transcode/session concurrency lives. These
        # are exactly the packages a fix to the session/ffmpeg/bus hot path
        # touches, and they were previously only covered by the nightly
        # full ./... -race run (ci-deep-scheduled.yml) — too late to block a
        # regression merging. Scoped + deterministic (no ffmpeg binary needed).
        run: make test-race-pr
