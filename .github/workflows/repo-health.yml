name: Repository Health Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-large-files:
    name: Prevent Large Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          set -euo pipefail
          MAX_SIZE_MB=5
          MAX_SIZE_BYTES=$((MAX_SIZE_MB * 1024 * 1024))

          echo "🔍 Checking for large files in commit..."

          # Get files changed in this PR/commit.
          # For PRs, only consider newly added files to avoid legacy long-lived branch noise.
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            FILES=$(git diff --name-only --diff-filter=A "${BASE_SHA}...${HEAD_SHA}" || true)
          else
            FILES=$(git diff --name-only HEAD~1..HEAD)
          fi

          LARGE_FILES=""
          for file in $FILES; do
            case "$file" in
              backend/vendor/*|backend/testdata/*|vendor/*|testdata/*)
                # Vendored sources and explicit testdata may exceed this limit by design.
                continue
                ;;
            esac
            if [ -f "$file" ]; then
              SIZE=$(stat -c%s "$file")
              if [ "$SIZE" -gt "$MAX_SIZE_BYTES" ]; then
                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                LARGE_FILES="${LARGE_FILES}  - $file (${SIZE_MB}MB)\n"
              fi
            fi
          done

          if [ -n "$LARGE_FILES" ]; then
            echo "❌ ERROR: Large files detected (>${MAX_SIZE_MB}MB):"
            echo -e "$LARGE_FILES"
            echo ""
            echo "💡 Solutions:"
            echo "  1. Move to testdata/ (gitignored)"
            echo "  2. Use Git LFS"
            echo "  3. Host externally"
            exit 1
          fi

          echo "✅ No large files detected"

  check-test-assets-location:
    name: Verify Test Assets in testdata/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check for test files in root
        run: |
          echo "🔍 Checking for test assets in repository root..."

          # Look for common test file patterns in root
          TEST_FILES=$(find . -maxdepth 1 -type f \( \
            -name "*.mp4" -o \
            -name "*.ts" -o \
            -name "*test*.mp4" -o \
            -name "downloaded_*.ts" -o \
            -name "verify_*.ts" \
          \) 2>/dev/null || true)

          if [ -n "$TEST_FILES" ]; then
            echo "❌ ERROR: Test files found in repository root:"
            echo "$TEST_FILES"
            echo ""
            echo "💡 Move these files to testdata/ directory:"
            echo "  mv *.mp4 *.ts testdata/videos/ testdata/segments/"
            exit 1
          fi

          echo "✅ No test files in root directory"

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Verify single Git root + no drift copies
        run: ./hack/verify-repo-hygiene.sh

  docs-drift:
    name: Docs Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Verify docs are rendered and committed (no drift)
        run: ./hack/verify-docs-drift.sh
