name: Repository Health Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint GitHub Actions workflows
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Verify workflow action refs are SHA-pinned
        run: ./backend/scripts/verify-action-pins.sh --local-only

  check-large-files:
    name: Prevent Large Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          set -euo pipefail

          # Get files changed in this PR/commit.
          # For PRs, only consider newly added files to avoid legacy long-lived branch noise.
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            mapfile -t files < <(git diff --name-only --diff-filter=A "${BASE_SHA}...${HEAD_SHA}" || true)
          else
            mapfile -t files < <(git diff --name-only HEAD~1..HEAD || true)
          fi

          ./backend/scripts/ci/check-large-files.sh "${files[@]}"

  check-test-assets-location:
    name: Verify Test Assets in testdata/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check for test files in root
        run: |
          ./backend/scripts/ci/check-test-assets-location.sh

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Verify single Git root + no drift copies
        run: ./hack/verify-repo-hygiene.sh

  docs-drift:
    name: Docs Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Verify docs are rendered and committed (no drift)
        run: ./hack/verify-docs-drift.sh
