name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Verify release manifest matches tag
        run: |
          tag="${GITHUB_REF_NAME}"
          version_file="$(tr -d '[:space:]' < backend/VERSION)"
          manifest_version="$(jq -r '.version' RELEASE_MANIFEST.json)"
          if [[ "${version_file}" != "${tag}" ]]; then
            echo "::error::backend/VERSION (${version_file}) does not match tag ${tag}." >&2
            exit 1
          fi
          if [[ "${manifest_version}" != "${tag}" ]]; then
            echo "::error::RELEASE_MANIFEST.json version (${manifest_version}) does not match tag ${tag}. Run backend/scripts/release-prepare.sh ${tag} before tagging." >&2
            exit 1
          fi
          if ! jq -e --arg t "${tag}" '.releases[$t]' DIGESTS.lock > /dev/null; then
            echo "::error::DIGESTS.lock has no entry for ${tag}. Run backend/scripts/release-prepare.sh ${tag} before tagging." >&2
            exit 1
          fi
          echo "Release manifest and digest lock agree with tag ${tag}."

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set Reproducible Build Headers
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve FFmpeg base image reference
        run: |
          version="$(sed -n 's/^FFMPEG_VERSION := //p' mk/variables.mk | head -n 1 | tr -d '[:space:]')"
          test -n "${version}"
          echo "FFMPEG_BASE_IMAGE=ghcr.io/manugh/xg2g-ffmpeg:${version}" >> "$GITHUB_ENV"
          echo "FFmpeg base image: ghcr.io/manugh/xg2g-ffmpeg:${version}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "~> 2" # pin to v2.x; bump intentionally when v3 ships
          args: release --clean --timeout 2h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
