name: Phase 4 Guardrails
# Historical compatibility workflow:
# - PRs: real enforcement lives in pr-required-gates.yml.
# - push/workflow_dispatch: keep this as a Phase4 backstop until a planned
#   branch-protection cutover retires the old name.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/webui/**"
      - "backend/scripts/**"
      - ".github/workflows/phase4-guardrails.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/webui/**"
      - "backend/scripts/**"
      - ".github/workflows/phase4-guardrails.yml"

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: PR path covered by Required Gates
        if: github.event_name == 'pull_request'
        run: echo "PR Phase4 guardrails are handled by pr-required-gates.yml; this workflow remains as push/manual backstop."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Check for new JSX files
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          # Get list of new .jsx files in this PR/commit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEW_JSX=$(git ls-files '*.jsx' || true)
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            NEW_JSX=$(git diff --name-only --diff-filter=A "$RANGE" | grep '\.jsx$' || true)
          fi

          if [ -n "$NEW_JSX" ]; then
            echo "❌ ERROR: New .jsx files detected (Phase 4 DoD B violation)"
            echo "New files:"
            echo "$NEW_JSX"
            echo ""
            echo "All new components must be .tsx (TypeScript)"
            exit 1
          fi
          echo "✅ No new .jsx files"

      - name: Check generated client wrapper boundary
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          bash frontend/webui/scripts/verify-client-wrapper-boundary.sh

      - name: TypeScript Check
        if: github.event_name != 'pull_request'
        run: |
          cd frontend/webui
          npm ci
          npm run build
          echo "✅ TypeScript compilation successful"
