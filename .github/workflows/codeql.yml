name: "CodeQL"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 0" # weekly

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # CodeQL is relatively heavy; queue newer runs instead of canceling in-progress work.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Keep CodeQL aligned with maintained first-party surfaces.
        # We intentionally omit C/C++ and Rust because the repo only has vendor
        # remnants there, and we omit Python because the remaining scripts are
        # low-volume helpers that are not worth a dedicated stale category.
        language: ["actions", "go", "javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # JavaScript/TypeScript is interpreted, so we can keep the scan focused on
      # maintained source and ignore generated WebUI artifacts.
      - name: Initialize CodeQL (JavaScript/TypeScript)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Initialize CodeQL
        if: matrix.language != 'javascript-typescript'
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8
        with:
          languages: ${{ matrix.language }}

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@27fdb267c15a8835f1ead03dfa07f89be2bb741a # v6
        with:
          go-version-file: backend/go.mod
          cache: true

      # Manual build for Go
      - name: Build Go
        if: matrix.language == 'go'
        run: |
          cd backend
          go build -tags=nogpu ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8
        with:
          category: "/language:${{ matrix.language }}"
