name: govulncheck

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "57 3 * * 0" # weekly

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Top-level read-only

jobs:
  vulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # for SARIF upload
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Latest stable

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # Latest stable
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: backend/go.sum
        env:
          GOTOOLCHAIN: auto

      - name: Install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Ensure jq (for severity evaluation)
        run: |
          jq --version || (sudo apt-get update && sudo apt-get install -y jq)

      - name: Run govulncheck (SARIF)
        run: |
          # govulncheck exits with code 3 if vulnerabilities are found.
          # We want the SARIF output even if it exits non-zero.
          # We use a temp file to avoid partial SARIF on disk if it fails early.
          govulncheck -tags=nogpu -format sarif ./... > govulncheck.tmp.sarif || {
            RET=$?
            if [ $RET -ne 3 ]; then
              echo "❌ govulncheck failed with unexpected exit code $RET"
              cat govulncheck.tmp.sarif || true
              exit $RET
            fi
            echo "✅ govulncheck found vulnerabilities (expected); SARIF generated."
          }
          mv govulncheck.tmp.sarif govulncheck.sarif

      - name: Fix SARIF duplicate tags
        if: always() && hashFiles('backend/govulncheck.sarif') != ''
        run: |
          # Deduplicate tags in rules to fix GitHub SARIF validation
          # Only run if file is valid JSON and not empty
          if [ -s govulncheck.sarif ] && jq '.' govulncheck.sarif >/dev/null 2>&1; then
            jq '
              if .runs then
                .runs |= map(
                  if .tool.driver.rules then
                    .tool.driver.rules |= map(
                      if .properties.tags then
                        .properties.tags |= unique
                      else
                        .
                      end
                    )
                  else
                    .
                  end
                )
              else
                .
              end
            ' govulncheck.sarif > govulncheck.fixed.sarif
            mv govulncheck.fixed.sarif govulncheck.sarif
          else
            echo "⚠️  govulncheck.sarif missing or invalid; skipping fix."
          fi

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('backend/govulncheck.sarif') != '' && success()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: backend/govulncheck.sarif
          category: govulncheck

      - name: Run govulncheck (JSON)
        run: govulncheck -tags=nogpu -format json ./... > govulncheck.json || true

      - name: Evaluate High/Critical vulnerabilities
        id: severity
        run: |
          set -euo pipefail
          if [ ! -s govulncheck.json ]; then
            echo "high_crit_count=0" >> "$GITHUB_OUTPUT"
            echo "fail=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Compute a single integer: number of vulns with severity >= HIGH (7)
          count=$(jq -r '
            ( .vulns // [] )
            | map(
                ( .osv.database_specific.severity? // "" ) as $lab
                | (if ($lab | ascii_upcase) == "CRITICAL" then 9 elif ($lab | ascii_upcase) == "HIGH" then 7 else 0 end) as $labelScore
                | ( ( .osv.severity? // [] )
                    | map( (.score // 0) as $s
                          | ( ($s|type) == "number" )
                            and $s or ( ($s|tostring) | (if test("^[0-9.]+$") then tonumber elif test("CRITICAL";"i") then 9 elif test("HIGH";"i") then 7 else 0 end) ) )
                    | (if length>0 then max else 0 end)
                  ) as $cvssScore
                | ([ $labelScore, $cvssScore ] | max) as $maxSev
                | select($maxSev >= 7)
              )
            | length
          ' govulncheck.json | tr -d '\n' )
          # Fallback safety: default to 0 if empty or non-numeric
          if ! printf '%s' "$count" | grep -Eq '^[0-9]+$'; then count=0; fi
          echo "High/Critical vulnerabilities: ${count}" >> "$GITHUB_STEP_SUMMARY"
          printf 'high_crit_count=%s\n' "$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then printf 'fail=true\n' >> "$GITHUB_OUTPUT"; else printf 'fail=false\n' >> "$GITHUB_OUTPUT"; fi

      - name: Fail on High/Critical
        if: steps.severity.outputs.fail == 'true'
        run: |
          echo "❌ High/Critical vulnerabilities detected: ${{ steps.severity.outputs.high_crit_count }}" >> "$GITHUB_STEP_SUMMARY"
          exit 1
