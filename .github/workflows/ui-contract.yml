name: UI Contract Enforcement
# Historical compatibility workflow:
# - PRs: real enforcement lives in pr-required-gates.yml.
# - push/workflow_dispatch: keep this as an explicit UI-contract backstop until
#   a planned branch-protection cutover retires the old name.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/webui/src/components/**/*.tsx"
      - "frontend/webui/src/components/**/*.module.css"
      - "frontend/webui/src/features/**/*.tsx"
      - "frontend/webui/src/features/**/*.module.css"
      - "frontend/webui/src/**/*.tsx"
      - "frontend/webui/src/**/*.css"
      - "backend/scripts/check-ui-contract.sh"
      - ".github/workflows/ui-contract.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/webui/src/components/**/*.tsx"
      - "frontend/webui/src/components/**/*.module.css"
      - "frontend/webui/src/features/**/*.tsx"
      - "frontend/webui/src/features/**/*.module.css"
      - "frontend/webui/src/**/*.tsx"
      - "frontend/webui/src/**/*.css"
      - "backend/scripts/check-ui-contract.sh"
      - ".github/workflows/ui-contract.yml"

permissions:
  contents: read

concurrency:
  group: repo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ui-contract-gate:
    name: Check UI Design Contract
    runs-on: ubuntu-latest

    steps:
      - name: PR path covered by Required Gates
        if: github.event_name == 'pull_request'
        run: echo "PR UI contract enforcement is handled by pr-required-gates.yml; this workflow remains as push/manual backstop."

      - name: Checkout code
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve changed UI files
        if: github.event_name != 'pull_request'
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed_files=$(git ls-files 'frontend/webui/src/**/*.tsx' 'frontend/webui/src/**/*.css' || true)
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed_files=$(git show --pretty='' --name-only "${{ github.sha }}" || true)
            else
              changed_files=$(git diff --name-only "$before..${{ github.sha }}" || true)
            fi
          fi

          mapfile -t scope_files < <(printf '%s\n' "$changed_files" \
            | grep -E '^frontend/webui/src/.*\.(tsx|css)$' \
            | sed -e 's#^frontend/webui/src/##' \
            | sort -u)

          if [ "${#scope_files[@]}" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/webui/src *.tsx/*.css changes detected"
            exit 0
          fi

          printf '%s\n' "${scope_files[@]}" > /tmp/ui-contract-scope.txt
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "count=${#scope_files[@]}" >> "$GITHUB_OUTPUT"
          echo "Scoped UI files (${#scope_files[@]}):"
          cat /tmp/ui-contract-scope.txt

      - name: Run UI Contract Gates
        if: github.event_name != 'pull_request' && steps.scope.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          chmod +x ./backend/scripts/check-ui-contract.sh
          mapfile -t scope_files < /tmp/ui-contract-scope.txt
          ./backend/scripts/check-ui-contract.sh "${scope_files[@]}"
        working-directory: ${{ github.workspace }}

      - name: No UI contract scope changes
        if: github.event_name != 'pull_request' && steps.scope.outputs.has_changes != 'true'
        run: echo "No scoped UI files changed; contract gate skipped by condition."
