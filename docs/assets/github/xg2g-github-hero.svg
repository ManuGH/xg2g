  <text x="156" y="184" fill="#16324F" font-family="Georgia, Times New Roman, serif" font-size="40" font-weight="700">From receiver MPEG-TS to HLS that actually plays</text>

  <rect x="148" y="238" width="192" height="232" rx="26" fill="#FFF7EA" stroke="#17324D" stroke-opacity="0.12"/>
