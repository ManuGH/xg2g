  <text x="908" y="292" fill="#4C5B69" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="18">macOS and iOS</text>

  <rect x="876" y="336" width="164" height="96" rx="24" fill="#FFF7EA" stroke="#17324D" stroke-opacity="0.10"/>
  <text x="908" y="375" fill="#16324F" font-family="Georgia, Times New Roman, serif" font-size="26" font-weight="700">iPhone</text>
  <text x="908" y="404" fill="#4C5B69" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="18">iPad and AirPlay</text>

  <rect x="876" y="448" width="164" height="96" rx="24" fill="#EEF6FB" stroke="#17324D" stroke-opacity="0.10"/>
