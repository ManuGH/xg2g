  <text x="636" y="557" fill="#16324F" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="19" font-weight="700">Health + metrics</text>

  <rect x="832" y="520" width="208" height="58" rx="20" fill="#FFF4DE"/>
  <text x="862" y="557" fill="#16324F" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="19" font-weight="700">Release-ready builds</text>
