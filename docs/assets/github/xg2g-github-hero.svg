  <text x="558" y="435" fill="#FFFFFF" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="17" font-weight="700">AAC</text>
  <rect x="636" y="410" width="108" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="666" y="435" fill="#FFFFFF" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="17" font-weight="700">fMP4</text>
  <rect x="758" y="410" width="72" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="778" y="435" fill="#FFFFFF" font-family="Avenir Next, Trebuchet MS, Arial, sans-serif" font-size="17" font-weight="700">HLS</text>

