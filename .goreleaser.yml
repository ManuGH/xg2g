# .goreleaser.yml
version: 2
project_name: xg2g

before:
  hooks:
    - make ui-build
    - bash -c 'cd backend && go mod tidy'
    - cp backend/scripts/build-ffmpeg.sh .
    - cp backend/scripts/ffmpeg-wrapper.sh .
    - cp backend/scripts/ffprobe-wrapper.sh .

builds:
  - id: xg2g
    main: ./backend/cmd/daemon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/ManuGH/xg2g/internal/version.Version={{.Version}} -X github.com/ManuGH/xg2g/internal/version.Commit={{.FullCommit}} -X github.com/ManuGH/xg2g/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: core
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - backend/VERSION
      - docs/**

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/manugh/xg2g:{{ .Version }}-amd64"
    dockerfile: infrastructure/docker/Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    extra_files:
      - build-ffmpeg.sh
      - ffmpeg-wrapper.sh
      - ffprobe-wrapper.sh
  - image_templates:
      - "ghcr.io/manugh/xg2g:{{ .Version }}-arm64"
    dockerfile: infrastructure/docker/Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    extra_files:
      - build-ffmpeg.sh
      - ffmpeg-wrapper.sh
      - ffprobe-wrapper.sh

docker_manifests:
  - name_template: "ghcr.io/manugh/xg2g:{{ .Version }}"
    image_templates:
      - "ghcr.io/manugh/xg2g:{{ .Version }}-amd64"
      - "ghcr.io/manugh/xg2g:{{ .Version }}-arm64"
  - name_template: "ghcr.io/manugh/xg2g:latest"
    image_templates:
      - "ghcr.io/manugh/xg2g:{{ .Version }}-amd64"
      - "ghcr.io/manugh/xg2g:{{ .Version }}-arm64"

release:
  github:
    owner: ManuGH
    name: xg2g
