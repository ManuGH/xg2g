# .goreleaser.yml
version: 2
project_name: xg2g

before:
  hooks:
    - make ui-build
    - bash -c 'cd backend && go mod tidy'

builds:
  - id: xg2g
    main: ./backend/cmd/daemon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/ManuGH/xg2g/internal/version.Version={{.Version}} -X github.com/ManuGH/xg2g/internal/version.Commit={{.FullCommit}} -X github.com/ManuGH/xg2g/internal/version.Date={{.Date}}
    # xg2g is a Linux server (Docker/systemd); macOS/Windows binaries are pointless
    # and Windows cross-compile fails (recordings_admin.go uses Linux-only unix.* syscalls).
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: core
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - backend/VERSION
      - docs/**

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  - id: xg2g
    dockerfile: infrastructure/docker/Dockerfile.release
    images:
      - "ghcr.io/manugh/xg2g"
    tags:
      - "{{ .Tag }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    labels:
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"

release:
  github:
    owner: ManuGH
    name: xg2g
  mode: replace
  name_template: "xg2g {{ .Tag }}"
  header: |
    xg2g {{ .Tag }} delivers browser-ready Enigma2 streaming with operator-grade security, observability, and release-backed artifacts.

    ## Quick links

    - Docker image: `ghcr.io/manugh/xg2g:{{ .Tag }}`
    - Quickstart: https://github.com/ManuGH/xg2g?tab=readme-ov-file#quickstart
    - API reference: https://manugh.github.io/xg2g/
    - Deployment guide: https://github.com/ManuGH/xg2g/blob/main/docs/ops/DEPLOYMENT.md
    - Security policy: https://github.com/ManuGH/xg2g/blob/main/SECURITY.md

    ## What changed

    The sections below are generated from commits since the previous release.
  footer: |

    ## Upgrade notes

    Review the generated sections above for any migration steps, auth or configuration changes, and operational follow-ups before upgrading production systems.

    ## Operator references

    - Systemd + Compose runbook: https://github.com/ManuGH/xg2g/blob/main/docs/ops/RUNBOOK_SYSTEMD_COMPOSE.md
    - Observability: https://github.com/ManuGH/xg2g/blob/main/docs/ops/OBSERVABILITY.md
    - Safari/iOS playback audit: https://github.com/ManuGH/xg2g/blob/main/docs/ops/SAFARI_AUDIT.md
    - Release template: https://github.com/ManuGH/xg2g/blob/main/docs/release/RELEASE_TEMPLATE.md
